########################################
# PostgreSQL Configuration
########################################

POSTGRESQL_HOST=localhost

POSTGRESQL_PORT=5432

POSTGRESQL_DATABASE=DataManagementDB

POSTGRESQL_ADMIN_USER=postgres

POSTGRESQL_ADMIN_PASSWORD=

POSTGRESQL_SCHEMA=public

########################################
# Discovery Settings
########################################

AUTO_DISCOVER_POSTGRESQL=true

AUTO_DISCOVER_SERVICE=true

AUTO_DISCOVER_PORT=true

AUTO_DISCOVER_INSTALL_PATH=true

AUTO_DISCOVER_DATA_DIRECTORY=true

AUTO_DISCOVER_PSQL=true

########################################
# Database Protection
########################################

CREATE_DATABASE_IF_MISSING=true

REUSE_DATABASE_IF_EXISTS=true

VALIDATE_DATABASE_BEFORE_REUSE=true

########################################
# Schema Protection
########################################

CREATE_SCHEMA_IF_MISSING=true

REUSE_SCHEMA_IF_EXISTS=true

VALIDATE_SCHEMA_BEFORE_REUSE=true

########################################
# Table Protection
########################################

CREATE_TABLES_IF_MISSING=true

REUSE_TABLES_IF_EXISTS=true

VALIDATE_TABLES_BEFORE_REUSE=true

########################################
# Seed Protection
########################################

SKIP_SEED_IF_DATA_EXISTS=true

VALIDATE_ROW_COUNTS=true

########################################
# Liquibase Protection
########################################

VALIDATE_CHANGELOG_TABLES=true

REUSE_CHANGELOG_TABLES=true

APPLY_PENDING_CHANGES_ONLY=true

########################################
# Readiness
########################################

MAX_RETRIES=30

RETRY_INTERVAL_SECONDS=5

READINESS_TIMEOUT_SECONDS=150

########################################
# Dataset Configuration
########################################

CUSTOMERS_RECORDS=100

PRODUCTS_RECORDS=100

ORDERS_RECORDS=500

########################################
# Logging
########################################

ENABLE_LOGGING=true

LOG_LEVEL=INFO

########################################
# Versions
########################################

POSTGRESQL_VERSION=AUTO

LIQUIBASE_VERSION=5.0.3

POSTGRESQL_DRIVER_VERSION=42.7.3

TERRAFORM_VERSION=1.13.0