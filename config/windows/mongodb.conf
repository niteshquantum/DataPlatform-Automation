MONGODB_HOST=127.0.0.1

MONGODB_PORT=27017

MONGODB_DATABASE=EcommerceMongoDB

MONGODB_VERSION=8.0.12

MONGOSH_VERSION=2.5.8

# Persistent deployment settings. Service registrations never point at Jenkins.
MONGODB_SERVICE_NAME=MongoDBAutomation
MONGODB_SERVICE_DISPLAY_NAME=MongoDB Automation Service
MONGODB_INSTALL_DIR=C:\ProgramData\DatabaseAutomation\mongodb\server
MONGODB_DATA_DIR=C:\ProgramData\DatabaseAutomation\mongodb\data
MONGODB_LOG_DIR=C:\ProgramData\DatabaseAutomation\mongodb\logs
MONGODB_LOG_FILE=mongodb.log
MONGODB_CONFIG_FILE=C:\ProgramData\DatabaseAutomation\mongodb\config\mongod.cfg
MONGODB_EXECUTABLE=C:\ProgramData\DatabaseAutomation\mongodb\server\bin\mongod.exe
MONGOSH_EXECUTABLE=C:\ProgramData\DatabaseAutomation\mongodb\mongosh\bin\mongosh.exe
MONGOSH_COMMAND_DIR=C:\ProgramData\DatabaseAutomation\mongodb\bin
MONGODB_DOWNLOAD_URL=https://fastdl.mongodb.org/windows/mongodb-windows-x86_64-8.0.12.zip
MONGOSH_DOWNLOAD_URL=https://downloads.mongodb.com/compass/mongosh-2.5.8-win32-x64.zip
